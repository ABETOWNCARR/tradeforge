name: tradeforge
description: "TradeForge — paper-first auto trading assistant with chart pattern scanner and risk controls."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.2
  http: ^1.2.2
  url_launcher: ^6.3.0
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  intl: ^0.19.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
